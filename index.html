<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parcería — Dashboard de Fondos</title>
  <style>
    :root {
      --verde: #2D6A4F;
      --amarillo: #F4C430;
      --gris: #4A4A4A;
      --verde-claro: #e8f5e9;
      --rojo: #e74c3c;
      --naranja: #f39c12;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7f5; color: var(--gris); }

    header {
      background: var(--verde);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 { color: var(--amarillo); font-size: 1.6rem; }
    header p  { color: #cde8d6; font-size: 0.85rem; margin-top: 2px; }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    #last-updated { color: #afd9be; font-size: 0.78rem; }

    #btn-actualizar {
      background: var(--amarillo);
      color: #1a3d2b;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.2s;
    }
    #btn-actualizar:hover { opacity: 0.85; }
    #btn-actualizar:disabled { opacity: 0.5; cursor: not-allowed; }
    #btn-actualizar .spinner {
      width: 14px; height: 14px;
      border: 2px solid #1a3d2b;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    #btn-actualizar.loading .spinner { display: inline-block; }
    #btn-actualizar.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #update-msg {
      font-size: 0.78rem;
      padding: 4px 10px;
      border-radius: 4px;
      display: none;
    }
    #update-msg.success { background: #d4edda; color: #155724; display: block; }
    #update-msg.error   { background: #f8d7da; color: #721c24; display: block; }

    .controls {
      background: #fff;
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      border-bottom: 2px solid var(--verde-claro);
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    .controls input, .controls select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .controls input:focus, .controls select:focus { border-color: var(--verde); }
    #search { flex: 1; min-width: 200px; }
    .stat-chip {
      background: var(--verde-claro);
      color: var(--verde);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.13); }

    .card-urgency-bar { height: 5px; }
    .urgency-alta  .card-urgency-bar { background: var(--rojo); }
    .urgency-media .card-urgency-bar { background: var(--naranja); }
    .urgency-baja  .card-urgency-bar,
    .urgency-      .card-urgency-bar { background: var(--verde); }

    .card-body { padding: 16px; flex: 1; position: relative; }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--verde); margin-bottom: 4px; line-height: 1.3; padding-right: 80px; }
    .card-entidad { font-size: 0.8rem; color: #888; margin-bottom: 6px; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

    .badge { font-size: 0.72rem; padding: 3px 8px; border-radius: 12px; font-weight: 600; }
    .badge-urgencia  { color: #fff; }
    .badge-alta      { background: var(--rojo); }
    .badge-media     { background: var(--naranja); }
    .badge-baja      { background: var(--verde); }
    .badge-entidad-p { background: #fff3cd; color: #856404; }

    /* Mejora 3 — Status badge */
    .card-status {
      position: absolute; top: 12px; right: 12px;
      font-size: 0.65rem; padding: 3px 8px;
      border-radius: 10px; font-weight: 700; white-space: nowrap;
    }
    .status-identificado { background: #e0e0e0; color: #666; }
    .status-analizando   { background: #e3f2fd; color: #1565c0; }
    .status-aplicando    { background: #fff8e1; color: #f57f17; }
    .status-presentado   { background: #fff3e0; color: #e65100; }
    .status-ganado       { background: #e8f5e9; color: #2e7d32; }
    .status-descartado   { background: #ffebee; color: #c62828; }
    .status-default      { background: #e0e0e0; color: #666; }

    /* Mejora 2 — Priority tags */
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .tag-chip  { background: #e8f5e9; color: #2D6A4F; font-size: 0.65rem; padding: 2px 7px; border-radius: 10px; font-weight: 600; }

    /* Mejora 1 — Date filter label groups */
    .filter-date-group { display: flex; flex-direction: column; gap: 2px; }
    .filter-date-group span { font-size: 0.7rem; color: #999; padding-left: 2px; }
    .filter-date-group input[type="date"] { padding: 6px 10px; font-size: 0.85rem; }

    .card-footer {
      padding: 10px 16px;
      background: #fafafa;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      color: #999;
    }
    .card-monto { color: var(--gris); font-weight: 600; }

    .empty { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #aaa; }
    .empty p { font-size: 1.1rem; margin-top: 8px; }
    #loading { text-align: center; padding: 60px; color: var(--verde); font-size: 1.1rem; }

    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      header h1 { font-size: 1.2rem; }
      .controls { padding: 12px 16px; }
      .grid { padding: 14px; gap: 14px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Parcería — Dashboard de Fondos</h1>
    <p>Monitor automático de oportunidades de financiamiento</p>
  </div>
  <div class="header-right">
    <div id="last-updated">Cargando...</div>
    <button id="btn-actualizar" onclick="runMonitor()">
      <span class="spinner"></span>
      <span class="btn-text">&#9654; Actualizar ahora</span>
    </button>
    <div id="update-msg"></div>
  </div>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Buscar por nombre o entidad...">
  <select id="filter-estado">
    <option value="">Todos los estados</option>
    <option>Identificado</option>
    <option>Analizando</option>
    <option>Aplicando</option>
    <option>Presentado</option>
    <option>Ganado</option>
    <option>Descartado</option>
  </select>
  <select id="filter-entidad-p">
    <option value="">Todas las entidades</option>
    <option>Parcería</option>
    <option>Fundación</option>
    <option>Gina</option>
    <option>Todos</option>
  </select>
  <select id="filter-urgencia">
    <option value="">Todas las urgencias</option>
    <option value="Alta">Alta (menos de 14 días)</option>
    <option value="Media">Media (menos de 30 días)</option>
    <option value="Baja">Baja / Sin fecha</option>
  </select>
  <label class="filter-date-group">
    <span>Abre desde</span>
    <input type="date" id="filter-apertura-desde">
  </label>
  <label class="filter-date-group">
    <span>Cierra antes de</span>
    <input type="date" id="filter-cierre-antes">
  </label>
  <span class="stat-chip" id="count-chip">0 oportunidades</span>
</div>

<div id="loading">Cargando oportunidades...</div>
<div class="grid" id="grid" style="display:none"></div>

<script>
  const SHEET_ID = "1dU2Tep3gakBNDPR5zRJdth_MDb5X_TVUratBgmQESHg";
  const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;

  let allOpps = [];

  // Column indices (0-based) matching the real Google Sheet layout
  const COL = {
    nombre:      0,   // "Nombre de la oportunidad"
    entidad:     1,   // "Entidad"
    monto:       2,   // "Cantidad de fondos"
    apertura:    3,   // "Fecha de apertura"
    cierre:      4,   // "Fecha de cierre"
    prioridades: 6,   // "Prioridades"
    link:        7,   // "Link"
    entidadP:    8,   // "Entidad_Parceria"
    estado:      9,   // "Estado"
    urgencia:    10,  // "Urgencia"
  };

  function cellVal(row, idx) {
    const cell = row.c && row.c[idx];
    if (!cell) return "";
    return String(cell.f || cell.v || "").trim();
  }

  async function loadData() {
    try {
      const res  = await fetch(GVIZ_URL);
      const text = await res.text();
      const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
      const rows = json.table.rows || [];

      allOpps = rows
        .map(row => ({
          nombre:      cellVal(row, COL.nombre),
          entidad:     cellVal(row, COL.entidad),
          monto:       cellVal(row, COL.monto),
          apertura:    cellVal(row, COL.apertura),
          cierre:      cellVal(row, COL.cierre),
          prioridades: cellVal(row, COL.prioridades),
          link:        cellVal(row, COL.link),
          entidadP:    cellVal(row, COL.entidadP),
          estado:      cellVal(row, COL.estado),
          urgencia:    cellVal(row, COL.urgencia),
        }))
        .filter(o => o.nombre !== "");

      document.getElementById("last-updated").textContent =
        `Última carga: ${new Date().toLocaleString('es-DO')}`;

      renderCards(filterOpps());
      document.getElementById("loading").style.display = "none";
      document.getElementById("grid").style.display = "grid";
    } catch (e) {
      document.getElementById("loading").textContent =
        "Error al cargar datos. Verifica que el Sheet sea público.";
      console.error(e);
    }
  }

  // Mejora 1 — parse a date string loosely; returns Date or null
  function parseDateStr(str) {
    if (!str) return null;
    // Try native parse first (works for ISO and many English formats)
    const d = new Date(str);
    if (!isNaN(d)) return d;
    // Try to extract a 4-digit year and a Spanish/English month name
    const months = {
      enero:1,february:2,febrero:2,marzo:3,march:3,abril:4,april:4,
      mayo:5,may:5,junio:6,june:6,julio:7,july:7,agosto:8,august:8,
      septiembre:9,september:9,octubre:10,october:10,noviembre:11,november:11,
      diciembre:12,december:12,january:1,
    };
    const lower = str.toLowerCase();
    const yearMatch = lower.match(/\b(20\d{2})\b/);
    if (!yearMatch) return null;
    const year = parseInt(yearMatch[1]);
    for (const [name, month] of Object.entries(months)) {
      if (lower.includes(name)) return new Date(year, month - 1, 1);
    }
    return null;
  }

  // Mejora 2 — infer category tags from prioridades field or keywords in nombre
  const TAG_RULES = [
    { label: "Género / Mujeres",     kw: ["género","genero","mujeres","mujer","women","gender","femenin"] },
    { label: "Juventud / Workforce", kw: ["juventud","youth","jóvenes","jovenes","workforce","empleo","trabajo"] },
    { label: "Digital / Tecnología", kw: ["digital","tecnolog","tech","innovac","software","datos","data"] },
    { label: "ESG / Sostenibilidad", kw: ["esg","sostenib","sustentab","ambiental","green","clima","climate"] },
    { label: "Arte / Cultura",       kw: ["arte","cultura","cultural","creative","creativos","artists","músic","cine"] },
    { label: "Caribe / LAC",         kw: ["caribe","caribbean","lac","latinoam","latin america","dominican","república"] },
  ];
  function inferTags(o) {
    // If Prioridades column has content, split it by commas/semicolons
    if (o.prioridades && o.prioridades.trim()) {
      return o.prioridades.split(/[,;\/\n]+/).map(t => t.trim()).filter(Boolean).slice(0, 5);
    }
    // Fallback: keyword match on nombre
    const text = (o.nombre + " " + o.entidad).toLowerCase();
    return TAG_RULES.filter(r => r.kw.some(k => text.includes(k))).map(r => r.label);
  }

  // Mejora 3 — status badge HTML
  const STATUS_CLASS = {
    "identificado": "status-identificado",
    "analizando":   "status-analizando",
    "aplicando":    "status-aplicando",
    "presentado":   "status-presentado",
    "ganado":       "status-ganado",
    "descartado":   "status-descartado",
  };
  function estadoBadgeHtml(estado) {
    if (!estado) return "";
    const cls = STATUS_CLASS[estado.toLowerCase()] || "status-default";
    return `<span class="card-status ${cls}">${escHtml(estado)}</span>`;
  }

  function escHtml(str) {
    return String(str || "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function urgencyClass(u) {
    u = (u || "").toLowerCase();
    if (u === "alta")  return "urgency-alta";
    if (u === "media") return "urgency-media";
    return "urgency-baja";
  }

  function urgencyBadgeClass(u) {
    u = (u || "").toLowerCase();
    if (u === "alta")  return "badge-alta";
    if (u === "media") return "badge-media";
    return "badge-baja";
  }

  function renderCards(opps) {
    const grid = document.getElementById("grid");
    const chip = document.getElementById("count-chip");
    chip.textContent = `${opps.length} oportunidad${opps.length !== 1 ? "es" : ""}`;

    if (opps.length === 0) {
      grid.innerHTML = `<div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <p>No se encontraron oportunidades con esos filtros.</p>
      </div>`;
      return;
    }

    grid.innerHTML = opps.map(o => {
      const uClass  = urgencyClass(o.urgencia);
      const uBadge  = urgencyBadgeClass(o.urgencia);
      const safeUrl = o.link ? o.link.replace(/'/g, "\\'") : "";
      const tags    = inferTags(o);
      const tagsHtml = tags.length
        ? `<div class="card-tags">${tags.map(t => `<span class="tag-chip">${escHtml(t)}</span>`).join("")}</div>`
        : "";
      return `
        <div class="card ${uClass}" onclick="${safeUrl ? `window.open('${safeUrl}','_blank')` : ''}">
          <div class="card-urgency-bar"></div>
          <div class="card-body">
            ${estadoBadgeHtml(o.estado)}
            <div class="card-title">${escHtml(o.nombre)}</div>
            <div class="card-entidad">${escHtml(o.entidad)}</div>
            ${tagsHtml}
            <div class="card-meta">
              ${o.urgencia ? `<span class="badge badge-urgencia ${uBadge}">${escHtml(o.urgencia)}</span>` : ""}
              ${o.entidadP ? `<span class="badge badge-entidad-p">${escHtml(o.entidadP)}</span>` : ""}
            </div>
          </div>
          <div class="card-footer">
            <span>${o.cierre ? "Cierre: " + escHtml(o.cierre) : "Sin fecha de cierre"}</span>
            <span class="card-monto">${o.monto ? escHtml(o.monto) : ""}</span>
          </div>
        </div>`;
    }).join("");
  }

  function filterOpps() {
    const q             = document.getElementById("search").value.toLowerCase();
    const estado        = document.getElementById("filter-estado").value;
    const entidadP      = document.getElementById("filter-entidad-p").value;
    const urgencia      = document.getElementById("filter-urgencia").value;
    const abreDesdeStr  = document.getElementById("filter-apertura-desde").value;
    const cierreAntesStr= document.getElementById("filter-cierre-antes").value;
    const abreDesde     = abreDesdeStr  ? new Date(abreDesdeStr)  : null;
    const cierreAntes   = cierreAntesStr? new Date(cierreAntesStr): null;

    return allOpps.filter(o => {
      if (q        && !(o.nombre + " " + o.entidad).toLowerCase().includes(q)) return false;
      if (estado   && o.estado   !== estado)   return false;
      if (entidadP && o.entidadP !== entidadP) return false;
      if (urgencia && o.urgencia !== urgencia) return false;

      // Mejora 1 — date filters (ignore row if date is unparseable)
      if (abreDesde) {
        const d = parseDateStr(o.apertura);
        if (d && d < abreDesde) return false;
      }
      if (cierreAntes) {
        const d = parseDateStr(o.cierre);
        if (d && d > cierreAntes) return false;
      }

      return true;
    });
  }

  async function runMonitor() {
    const btn = document.getElementById("btn-actualizar");
    const msg = document.getElementById("update-msg");
    btn.disabled = true;
    btn.classList.add("loading");
    msg.className = "";
    msg.textContent = "";
    try {
      const res  = await fetch("http://localhost:5001/run-monitor", {
        method: "POST",
        headers: { "Content-Type": "application/json" }
      });
      const data = await res.json();
      if (res.ok) {
        msg.className = "success";
        msg.textContent = data.message || "Monitor ejecutado correctamente.";
        setTimeout(loadData, 3000);
      } else {
        msg.className = "error";
        msg.textContent = data.error || "Error al ejecutar el monitor.";
      }
    } catch (e) {
      msg.className = "error";
      msg.textContent = "No se pudo conectar al servidor local (localhost:5001). ¿Está corriendo start.sh?";
    } finally {
      btn.disabled = false;
      btn.classList.remove("loading");
    }
  }

  ["search","filter-estado","filter-entidad-p","filter-urgencia",
   "filter-apertura-desde","filter-cierre-antes"].forEach(id => {
    document.getElementById(id).addEventListener("input", () => renderCards(filterOpps()));
  });

  loadData();
</script>
</body>
</html>
